<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Talos mark: a chamfered HUD panel (signature bottom-right cut) with the
       live status dot. Monochrome chrome + the single accent, matching the
       design tokens (bg hsl(0 0% 0%), fg white, accent hsl(140 90% 60%)). -->
  <rect width="32" height="32" fill="#000"/>
  <!-- Panel silhouette with the bottom-right chamfer -->
  <path d="M5 5 H27 V21 L21 27 H5 Z"
        fill="none" stroke="#e7e9ec" stroke-width="2"/>
  <!-- The chamfer hairline echoed inside (the two-layer cut) -->
  <path d="M21 27 L27 21" stroke="#e7e9ec" stroke-width="2" fill="none"/>
  <!-- Live status dot -->
  <circle cx="10.5" cy="10.5" r="2.4" fill="hsl(140 90% 60%)"/>
</svg>
