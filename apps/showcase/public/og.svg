<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Oxanium', system-ui, sans-serif">
  <!-- Social card. Monochrome HUD: black field, ambient grid, chamfered frame,
       name + tagline + install. Single accent (green) on the live dot + cut. -->
  <rect width="1200" height="630" fill="#000"/>

  <!-- ambient grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M90 0 V630 M180 0 V630 M270 0 V630 M360 0 V630 M450 0 V630 M540 0 V630 M630 0 V630 M720 0 V630 M810 0 V630 M900 0 V630 M990 0 V630 M1080 0 V630"/>
  </g>

  <!-- chamfered frame (bottom-right cut) -->
  <path d="M40 40 H1160 V520 L1100 580 H40 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Brand mark — the inverted triangle with the lower-right notch, scaled from
       its 32-unit viewBox (×3.4) and parked top-right of the content frame. -->
  <g transform="translate(960 96) scale(3.4)">
    <path d="M5.6 7.2 Q5 6 6.4 6 H25.6 Q27 6 26.4 7.2
             L23.13 13.72 Q22.82 14.35 22.19 14.04
             L21.84 13.86 Q21.21 13.55 20.90 14.18
             L18.84 18.29 Q18.53 18.92 19.16 19.23
             L19.51 19.41 Q20.14 19.72 19.83 20.35
             L16.9 26.2 Q16 28 15.1 26.2 Z"
          fill="hsl(0 0% 95%)" stroke-linejoin="round"/>
  </g>

  <!-- system label -->
  <g transform="translate(96 130)">
    <circle cx="6" cy="-6" r="5" fill="hsl(140 90% 60%)"/>
    <text x="24" y="0" fill="#e7e9ec" fill-opacity="0.6" font-size="22"
          letter-spacing="6" font-weight="300">SYS://TALOS-UI</text>
  </g>

  <!-- name -->
  <text x="92" y="320" fill="#e7e9ec" font-size="118" font-weight="600"
        letter-spacing="2">Talos UI</text>

  <!-- tagline -->
  <text x="96" y="392" fill="#e7e9ec" fill-opacity="0.78" font-size="38"
        font-weight="300">Interfaces that visualise a running system.</text>
  <text x="96" y="440" fill="#e7e9ec" fill-opacity="0.55" font-size="28"
        font-weight="300">Gauges, trends, meters, flows — colour and motion bound to live state.</text>

  <!-- install snippet, in a chamfered chip -->
  <g transform="translate(96 488)">
    <path d="M0 0 H470 V44 L452 62 H0 Z" fill="#ffffff" fill-opacity="0.05"
          stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="24" y="40" fill="hsl(140 90% 60%)" font-size="26"
          font-family="ui-monospace, monospace">bun add @j_shelfwood/talos-ui</text>
  </g>
</svg>
