# Static serving for the Talos UI showcase (Astro, trailing-slash dir output).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro emits /path/ -> /path/index.html. try_files resolves the directory
  # index, then the .html; a genuine miss returns =404 so the status is honest
  # (error_page below then renders the styled 404 page *with* a 404 status —
  # ending try_files in /404.html would serve it as a misleading 200).
  location / {
    try_files $uri $uri/ $uri/index.html $uri.html =404;
  }

  # Long-cache fingerprinted build assets; never cache HTML (so deploys show up).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location ~* \.(woff2?|png|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
  }
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
  }

  error_page 404 /404.html;
  gzip on;
  gzip_types text/css application/javascript image/svg+xml application/json;
  gzip_min_length 512;
}
