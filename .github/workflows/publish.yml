name: Publish to npm

# Tag a release to publish: `git tag v0.1.0 && git push --tags`.
# The tag version should match packages/talos-ui/package.json.
on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create the GitHub release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build package
        run: bun run build:pkg

      - name: Verify tag matches package version
        working-directory: packages/talos-ui
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi
          echo "publishing @shelfwood/talos-ui@$PKG"

      - name: Verify package contents
        working-directory: packages/talos-ui
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/talos-ui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "See packages/talos-ui/CHANGELOG.md"
        env:
          GH_TOKEN: ${{ github.token }}
